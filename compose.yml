# Nome do projeto Compose = nome do projeto definido na instalação (install.sh).
# Isso garante que "docker compose ls", nomes padrão de rede e afins também
# fiquem isolados por projeto, e não só o container/imagem abaixo.
name: ${PROJECT_NAME:-flutter-dev}

services:
  flutter-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-1000}
    image: ${PROJECT_NAME:-flutter-dev}:latest
    container_name: ${PROJECT_NAME:-flutter-dev}
    # network_mode host simplifica X11 (GUI Linux) e adb (Android) no Fedora
    network_mode: host
    # privileged é necessário para o container enxergar dispositivos USB (adb)
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
      - ANDROID_SDK_ROOT=/opt/android-sdk
      - HOME=/home/devuser
      - XDG_DATA_HOME=/home/devuser/.local/share
      - XDG_CONFIG_HOME=/home/devuser/.config
      - XDG_CACHE_HOME=/home/devuser/.cache
    volumes:
      - ./:/app
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev/bus/usb:/dev/bus/usb
      # Nomes de volume aqui são estáticos de propósito: o Compose NÃO
      # interpola variáveis em nomes/chaves, só em valores. O isolamento por
      # projeto já é garantido pelo campo "name:" no topo deste arquivo — o
      # Compose prefixa automaticamente o volume real com o nome do projeto,
      # ex.: "projeto-teste_flutter-pub-cache".
      - flutter-pub-cache:/home/devuser/.pub-cache
      - android-home:/home/devuser/.android
    working_dir: /app
    stdin_open: true
    tty: true

volumes:
  flutter-pub-cache:
  android-home: